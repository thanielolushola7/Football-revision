<!DOCTYPE html>
<html>
<head>
    <title>Revision Ultimate Team</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚽ Revision Ultimate Team</h1>

<div id="menu">
    <button onclick="showSection('team')">🏟 Team</button>
    <button onclick="showSection('subjects')">📚 Cards</button>
    <button onclick="showSection('packs')">📦 Packs</button>
</div>

<!-- TEAM -->
<div id="team-section" class="section">
    <h2>Your Squad (Max 5)</h2>
    <div id="squad"></div>
</div>

<!-- SUBJECTS -->
<div id="subjects-section" class="section">
    <h2>Your Cards</h2>
    <div id="subjects"></div>
</div>

<!-- PACKS -->
<div id="packs-section" class="section">
    <h2>📦 Packs</h2>
    <p>XP: <span id="xp">0</span></p>
    <button onclick="openPack()">Open Pack (50 XP)</button>
    <div id="pack-animation"></div>
</div>

<script src="script.js"></script>

</body>
</html>
