<!DOCTYPE html>
<html>
<head>
  <title>GCSE FUT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
  <h1>GCSE ULTIMATE TEAM</h1>
  <p>Coins: <span id="coins">0</span></p>

  <button onclick="showSection('subjects')">📚 Subjects</button>
  <button onclick="showSection('team')">👥 Team</button>
  <button onclick="showSection('packs')">🎁 Packs</button>
  <button onclick="resetGame()">🔄 Reset</button>
</div>

<div id="subjects" class="section">
  <h2>Subjects</h2>
  <div id="subjects-container"></div>
</div>

<div id="topics" class="section">
  <h2 id="topic-subject-name"></h2>
  <button onclick="showSection('subjects')">⬅ Back</button>
  <div id="topics-container"></div>
</div>

<div id="team" class="section">
  <h2>My Team</h2>
  <div id="team-container"></div>
</div>

<div id="packs" class="section">
  <h2>Packs</h2>
  <button onclick="openPack('basic')">Basic Pack (50 coins)</button>
  <button onclick="openPack('premium')">Premium Pack (100 coins)</button>

  <div id="pack-result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
