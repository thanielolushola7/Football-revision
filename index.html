<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Ultimate Team</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- Header -->
<header>
    <h1>⚽ Revision Ultimate Team</h1>
</header>

<!-- Menu -->
<div id="menu">

    <!-- BIG PLAY TILE -->
    <div class="menu-main" onclick="showSection('subjects')">
        <h2>PLAY</h2>
        <p>Division Rivals</p>
    </div>

    <!-- SIDE TILES -->
    <div class="menu-side">

        <div class="menu-card" onclick="showSection('packs')">
            <h3>PACKS</h3>
        </div>

        <div class="menu-card">
            <h3>OBJECTIVES</h3>
        </div>

        <div class="menu-card">
            <h3>STORE</h3>
        </div>

    </div>

</div>

<!-- Subjects Section -->
<div id="subjects" class="hidden">
    <h2>Select Subject</h2>
    <div id="subjects-container"></div>
</div>

<!-- Packs Section -->
<div id="packs" class="hidden">
    <h2>Packs (Coming Soon!)</h2>
    <p>Open packs to unlock new topics and improve your team!</p>
</div>

<script src="script.js"></script>
</body>
</html>
