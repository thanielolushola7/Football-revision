<!DOCTYPE html>
<html>
<head>
  <title>GCSE Ultimate Team</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
  <h1>GCSE ULTIMATE TEAM</h1>
  <p>Coins: <span id="coins">0</span></p>

  <button onclick="showSection('subjects')">Play</button>
  <button onclick="showSection('team')">Team</button>
  <button onclick="showSection('quiz')">Quiz</button>
  <button onclick="resetGame()">Reset</button>
</div>

<div id="subjects" class="section">
  <h2>Select Subject</h2>
  <div id="subjects-container"></div>
</div>

<div id="topics" class="section">
  <button onclick="showSection('subjects')">⬅ Back</button>
  <h2 id="subject-title"></h2>
  <div id="topics-container"></div>
</div>

<div id="quiz" class="section">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<div id="team" class="section">
  <h2>Your Subjects</h2>
  <div id="team-container"></div>
</div>

<script src="gcseData.js"></script>
<script src="script.js"></script>

</body>
</html>
