<!DOCTYPE html>
<html>
<head>
    <title>Revision Ultimate Team</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚽ Revision Ultimate Team</h1>

<!-- FIFA STYLE MENU -->
<div id="menu">
    <div class="menu-card" onclick="showSection('subjects')">
        <h2>PLAY</h2>
    </div>

    <div class="menu-card" onclick="showSection('packs')">
        <h2>PACKS</h2>
    </div>
</div>

<!-- SUBJECTS -->
<div id="subjects-section" class="section">
    <h2>Select Subject</h2>
    <div id="subjects"></div>
</div>

<!-- PACKS -->
<div id="packs-section" class="section">
    <h2>Packs</h2>
    <p>XP: <span id="xp">0</span></p>

    <button onclick="openPack('bronze')">Bronze Pack (30 XP)</button>
    <button onclick="openPack('silver')">Silver Pack (50 XP)</button>
    <button onclick="openPack('gold')">Gold Pack (80 XP)</button>

    <div id="pack-animation"></div>
</div>

<!-- GAME -->
<div id="game-section" class="section">
    <h2 id="game-subject">Match</h2>
    <p id="score">0 - 0</p>
    <p id="question"></p>

    <div>
        <button onclick="answer(0)" id="a0"></button>
        <button onclick="answer(1)" id="a1"></button>
        <button onclick="answer(2)" id="a2"></button>
        <button onclick="answer(3)" id="a3"></button>
    </div>

    <br>
    <button onclick="startMatch()">Start Match</button>
</div>

<script src="script.js"></script>

</body>
</html>
