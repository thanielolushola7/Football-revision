<!DOCTYPE html>
<html>
<head>
    <title>Revision Ultimate Team</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚽ Revision Ultimate Team</h1>

<!-- MENU -->
<div id="menu">
    <button onclick="showSection('team')">🏟 Team</button>
    <button onclick="showSection('subjects')">📚 Subjects</button>
    <button onclick="showSection('season')">🎟 Season Pass</button>
    <button onclick="showSection('rivals')">🏆 Division Rivals</button>
</div>

<!-- TEAM SECTION -->
<div id="team-section" class="section">
    <h2>Your Squad</h2>
    <div id="squad"></div>
    <p>Select 3–5 cards for your match squad.</p>
    <button onclick="startMatch()">Start Match</button>
</div>

<!-- SUBJECTS SECTION -->
<div id="subjects-section" class="section">
    <h2>Subjects</h2>
    <div id="subjects"></div>
</div>

<!-- SEASON PASS SECTION -->
<div id="season-section" class="section">
    <h2>🎟 Season Pass</h2>
    <p>Level: <span id="level">1</span></p>
    <p>XP: <span id="season-xp">0</span> / 100</p>
    <div class="progress-bar">
        <div id="progress"></div>
    </div>
    <p id="reward"></p>
</div>

<!-- DIVISION RIVALS SECTION -->
<div id="rivals-section" class="section">
    <h2>🏆 Division Rivals</h2>
    <p id="score">You 0 - 0 Opponent</p>
    <p id="question">Press start</p>
    <div class="buttons">
        <button onclick="answer(0)" id="a0"></button>
        <button onclick="answer(1)" id="a1"></button>
        <button onclick="answer(2)" id="a2"></button>
        <button onclick="answer(3)" id="a3"></button>
    </div>
    <p id="result"></p>
</div>

<button onclick="resetAll()">Reset Progress</button>

<script src="script.js"></script>
</body>
</html>
