<!DOCTYPE html>
<html>
<head>
  <title>GCSE FUT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
  <h1>GCSE ULTIMATE TEAM</h1>
  <p>Coins: <span id="coins">0</span></p>

  <div class="menu-buttons">
    <button onclick="showSection('subjects')">Play</button>
    <button onclick="showSection('team')">Team</button>
    <button onclick="showSection('packs')">Packs</button>
    <button onclick="resetGame()">Reset</button>
  </div>
</div>

<div id="subjects" class="section">
  <h2>Select Subject</h2>
  <div id="subjects-container"></div>
</div>

<div id="topics" class="section">
  <button onclick="showSection('subjects')">⬅ Back</button>
  <h2 id="topic-title"></h2>
  <div id="topics-container"></div>
</div>

<div id="quiz" class="section">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<div id="team" class="section">
  <h2>My Team</h2>
  <div id="team-container"></div>
</div>

<div id="packs" class="section">
  <h2>Packs</h2>
  <button onclick="openPack('basic')">Basic (50)</button>
  <button onclick="openPack('premium')">Premium (100)</button>
  <div id="pack-result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
