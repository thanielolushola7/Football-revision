<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Ultimate Team</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- Header -->
<header>
    <h1>⚽ Revision Ultimate Team</h1>
</header>

<!-- MENU -->
<div id="menu">
    <div class="menu-main" onclick="showSection('subjects')">
        <h2>PLAY</h2>
        <p>Division Rivals</p>
    </div>

    <div class="menu-side">
        <div class="menu-card" onclick="showSection('packs')">
            <h3>PACKS</h3>
        </div>
        <div class="menu-card" onclick="showSection('team')">
            <h3>TEAM</h3>
        </div>
        <div class="menu-card">
            <h3>OBJECTIVES</h3>
        </div>
    </div>
</div>

<!-- SUBJECTS -->
<div id="subjects" class="hidden">
    <h2>Select Subject</h2>
    <div id="subjects-container"></div>
    <button class="back-btn" onclick="showSection('menu')">Back</button>
</div>

<!-- PACKS -->
<div id="packs" class="hidden">
    <h2>Packs</h2>
    <p>Open packs to unlock new players!</p>
    <button class="back-btn" onclick="showSection('menu')">Back</button>
</div>

<!-- TEAM -->
<div id="team" class="hidden">
    <h2>Your Team</h2>
    <div id="team-container"></div>
    <button class="back-btn" onclick="showSection('menu')">Back</button>
</div>

<!-- DAILY LOGIN -->
<div id="daily-login-popup" class="hidden">
    <h3>Daily Reward!</h3>
    <p>You've claimed your daily bonus 🎉</p>
    <button onclick="closeDailyLogin()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
